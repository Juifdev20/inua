# ===============================
# CONFIGURATION PRODUCTION (RENDER)
# ===============================

# ===============================
# SERVEUR
# ===============================
server.port=${PORT:8080}
server.address=0.0.0.0
server.error.include-message=always

# ===============================
# BASE DE DONNEES (POSTGRESQL)
# ===============================
# Si les variables ne sont pas definies, utiliser des valeurs par defaut
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/hospital_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Pool de connexions (important pour production)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# Ne pas faire planter l'application si la DB n'est pas disponible au demarrage
spring.datasource.continue-on-error=true
spring.sql.init.mode=never

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Hibernate dialect est auto-detecte, pas besoin de le specifier

# ===============================
# SECURITE JWT
# ===============================
# Si JWT_SECRET n'est pas defini, utiliser une cle par defaut (changer en production!)
jwt.secret=${JWT_SECRET:MaCleSecreteParDefautPourTestInuaAfia2025}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework=INFO
logging.level.org.hibernate=WARN
logging.level.com.hospital=INFO

# ===============================
# ACTUATOR (Health check)
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never