<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="navyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="silverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#94a3b8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#navyGradient)" />
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#silverGradient)" stroke-width="4" opacity="0.6" />
  
  <!-- Medical cross with silver gradient -->
  <rect x="200" y="120" width="112" height="272" rx="16" fill="url(#silverGradient)" />
  <rect x="120" y="200" width="272" height="112" rx="16" fill="url(#silverGradient)" />
  
  <!-- Heart in center -->
  <path d="M256,220 C240,200 200,200 200,240 C200,260 256,320 256,320 C256,320 312,260 312,240 C312,200 272,200 256,220 Z" fill="#f59e0b" />
  
  <!-- Text INUA -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="url(#silverGradient)">INUA</text>
  
  <!-- Text AFYA -->
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="url(#silverGradient)">AFYA</text>
</svg>
