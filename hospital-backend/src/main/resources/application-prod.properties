# ===============================
# CONFIGURATION PRODUCTION (RENDER)
# ===============================

# ===============================
# SERVEUR
# ===============================
server.port=${PORT:8080}
server.address=0.0.0.0
server.error.include-message=always

# Lancer le serveur web immediatement
spring.main.web-application-type=servlet

# Initialisation paresseuse pour demarrer plus vite
spring.main.lazy-initialization=true

# ===============================
# BASE DE DONNEES (POSTGRESQL - SUPABASE SHARED POOLER)
# ===============================
# Supabase Shared Pooler - aws-0-eu-west-1.pooler.supabase.com
# Utilisation de variables d'environnement avec valeur par défaut
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:5432/postgres?user=postgres.ozbfvhadpvucvzlqlyxl&password=inuaafia@4223&sslmode=require}
spring.datasource.username=${DB_USERNAME:postgres.ozbfvhadpvucvzlqlyxl}
spring.datasource.password=${DB_PASSWORD:inuaafia@4223}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de connexions optimisé pour Connection Pooler Supabase (PgBouncer)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=0

# Continuer meme si la DB echoue
spring.datasource.continue-on-error=true
spring.sql.init.mode=never

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Optimisation JPA - desactiver Open EntityManager in View
spring.jpa.open-in-view=false

# ===============================
# GESTION DES FICHIERS (IMAGES ET DOCUMENTS)
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads/profiles

# ===============================
# SECURITE JWT
# ===============================
jwt.secret=${JWT_SECRET:MaCleSecreteParDefautPourTestInuaAfia2025}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ============================================================
# CONFIGURATION JSON (JACKSON) - RÉPARATION AFFICHAGE REACT
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.property-naming-strategy=LOWER_CAMEL_CASE
spring.jackson.default-property-inclusion=always

# ===============================
# CONFIGURATION SPRING MVC
# ===============================
spring.mvc.throw-exception-if-no-handler-found=false
spring.web.resources.add-mappings=true

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework=INFO
logging.level.org.hibernate=WARN
logging.level.com.hospital=INFO
logging.level.org.springframework.web=INFO

# ===============================
# ACTUATOR (Health check)
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.server.port=${PORT:8080}