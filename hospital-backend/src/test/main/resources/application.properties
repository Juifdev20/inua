# ===============================
# CONFIGURATION DE L'APPLICATION
# ===============================
spring.application.name=hospital-backend
server.port=8080
server.error.include-message=always

# ===============================
# BASE DE DONNEES (POSTGRESQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/hospital_db
spring.datasource.username=postgres
spring.datasource.password=INUA

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# S…CURIT… JWT
# ===============================
jwt.secret=MaCleSecreteInuaAfiaTresLonguePourLaSecuriteDuCliniqueUCBC2025
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ===============================
# GESTION DES FICHIERS (IMAGES)
# ===============================
# Augmente la limite pour accepter les photos de profil en Base64
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Configuration personnalisÈe pour le dossier de stockage
# Ce dossier sera crÈÈ ‡ la racine de ton projet
file.upload-dir=uploads/profiles

# ===============================
# CONFIGURATION SERVEUR (TOMCAT)
# ===============================
# EmpÍche la dÈconnexion lors de l'envoi de gros fichiers
server.tomcat.max-swallow-size=10MB
server.tomcat.max-http-form-post-size=10MB
# Autorise le serveur ‡ Ècouter sur toutes les adresses IP du rÈseau local
server.address=0.0.0.0
