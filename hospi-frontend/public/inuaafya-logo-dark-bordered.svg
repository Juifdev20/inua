<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="darkBlueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer border circle -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="url(#borderGradient)" stroke-width="8" />
  
  <!-- Middle ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#1e40af" stroke-width="4" opacity="0.5" />
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="236" fill="url(#darkBlueGradient)" />
  
  <!-- Medical cross with subtle glow -->
  <rect x="200" y="120" width="112" height="272" rx="16" fill="#e2e8f0" />
  <rect x="120" y="200" width="272" height="112" rx="16" fill="#e2e8f0" />
  
  <!-- Heart in center -->
  <path d="M256,220 C240,200 200,200 200,240 C200,260 256,320 256,320 C256,320 312,260 312,240 C312,200 272,200 256,220 Z" fill="#f43f5e" />
  
  <!-- Text INUA -->
  <text x="256" y="450" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="white">INUA</text>
  
  <!-- Text AFYA -->
  <text x="256" y="490" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#e2e8f0">AFYA</text>
</svg>
