<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- iOS Support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="InuaAfia" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/logo192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/logo512.png" />
    <link rel="apple-touch-startup-image" href="/logo192.png" />
    
    <!-- PWA Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/logo192.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo192.png" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#0f172a" />
    
    
    <!-- Description -->
    <meta name="description" content="InuaAfia - Système de Gestion Hospitalier Moderne" />
    
    <!-- 🚫 Empêcher le cache agressif -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <title>InuaAfia - Système Hospitalier</title>
    
    <!-- 🔧 Script de nettoyage et redirection si ancien domaine détecté -->
    <script>
      (function() {
        // 🚨 REDIRECTION IMMÉDIATE si on est sur l'ancien domaine
        if (location.hostname.includes('inua-oux2')) {
          console.log('[Redirect] Ancien domaine détecté, redirection vers inuaafia.onrender.com...');
          // Nettoyer avant de partir
          localStorage.clear();
          sessionStorage.clear();
          // Rediriger vers le nouveau domaine avec le même chemin
          var newUrl = 'https://inuaafia.onrender.com' + location.pathname + location.search;
          location.replace(newUrl);
          return; // Stopper l'exécution
        }
        
        // Nettoyage si paramètre oldcache présent
        if (localStorage.getItem('token') && location.search.includes('oldcache')) {
          console.log('[Cleanup] Nettoyage cache demandé...');
          localStorage.clear();
          sessionStorage.clear();
          caches.keys().then(names => names.forEach(name => caches.delete(name)));
        }
      })();
    </script>
  </head>
  <body>
    
    <div id="root"></div>
    
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
