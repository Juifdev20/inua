# ===============================
# CONFIGURATION DE L'APPLICATION
# ===============================
# Profil actif : local (PostgreSQL) ou prod (Render/Supabase)
# Défini via variable d'environnement SPRING_PROFILES_ACTIVE ou -Dspring.profiles.active=local
# ? POUR PRODUCTION : supprimer ou commenter la ligne suivante
spring.profiles.active=local
spring.application.name=hospital-backend

# IMPORTANT: Render definit PORT=10000, on utilise cette valeur
server.port=${PORT:8080}
server.address=0.0.0.0
server.servlet.context-path=
server.error.include-message=always

# ===============================
# BASE DE DONNÉES - LOCAL (H2) / PROD (SUPABASE)
# ===============================
# Mode local (développement) : H2 | Mode production (Render) : Supabase via variables d'env
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./hospital_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# HikariCP
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.pool-name=HospitalHikariCP

# ===============================
# JPA / HIBERNATE
# ===============================
# 'update' pour H2 (local), 'none' pour PostgreSQL (production) via variable d'env
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# Dialecte automatique selon la base
spring.jpa.database-platform=${JPA_DIALECT:}

# Optimisations connexion
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=100

# ===============================
# SÉCURITÉ JWT
# ===============================
jwt.secret=${JWT_SECRET:MaCleSecreteInuaAfiaTresLonguePourLaSecuriteDuCliniqueUCBC2025}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===============================
# GESTION DES FICHIERS (IMAGES ET DOCUMENTS)
# ===============================
# Limité ŕ 10 Mo pour PostgreSQL (stockage documents en bytea)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=uploads/profiles

# ===============================
# CONFIGURATION SERVEUR (TOMCAT)
# ===============================
server.tomcat.max-swallow-size=50MB
server.tomcat.max-http-form-post-size=50MB

# ============================================================
# CONFIGURATION JSON (JACKSON) - RÉPARATION AFFICHAGE REACT
# ============================================================
# 1. Transforme les dates [2026, 3, 4] en format texte "2026-03-04"
# Sans cela, React ne peut pas lire la date de naissance.
spring.jackson.serialization.write-dates-as-timestamps=false

# 2. Force la conversion automatique du snake_case vers camelCase
# Exemple: La colonne SQL 'health_area' deviendra 'healthArea' dans le JSON.
spring.jackson.property-naming-strategy=LOWER_CAMEL_CASE

# 3. Inclut les champs męme s'ils sont vides pour éviter les "undefined" dans React
spring.jackson.default-property-inclusion=always

# ===============================
# CONFIGURATION SPRING MVC - ÉVITER NoResourceFoundException
# ===============================
# Activer la gestion des ressources statiques uniquement pour les uploads
spring.mvc.throw-exception-if-no-handler-found=false
spring.web.resources.add-mappings=true

# ===============================
# FLYWAY - DÉSACTIVÉ EN LOCAL
# ===============================
# ?? Flyway désactivé en local ŕ cause des conflits de versions (V3, V4 en double)
# Hibernate gčre le schéma avec ddl-auto=update
spring.flyway.enabled=false

# ===============================
# CONFIGURATION FRONTEND - OAUTH2 REDIRECT
# ===============================
# URL du frontend pour les redirections aprčs login OAuth2
app.frontend-url=http://localhost:5173

# ===============================
# OAUTH2 - SOCIAL LOGIN (Google & Facebook)
# ===============================
# ? GOOGLE OAUTH2 - Configuration
# Remplacez par vos vraies credentials depuis Google Cloud Console
# https://console.cloud.google.com/apis/credentials
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.client-name=Google

# ? FACEBOOK OAUTH2 - Configuration
# Remplacez par vos vraies credentials depuis Facebook Developers
# https://developers.facebook.com/apps
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:your-facebook-app-id}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:your-facebook-app-secret}
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.registration.facebook.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.facebook.client-name=Facebook

# Provider Facebook spécifique
spring.security.oauth2.client.provider.facebook.authorization-uri=https://www.facebook.com/v18.0/dialog/oauth
spring.security.oauth2.client.provider.facebook.token-uri=https://graph.facebook.com/v18.0/oauth/access_token
spring.security.oauth2.client.provider.facebook.user-info-uri=https://graph.facebook.com/v18.0/me?fields=id,name,email,first_name,last_name
spring.security.oauth2.client.provider.facebook.user-name-attribute=id

