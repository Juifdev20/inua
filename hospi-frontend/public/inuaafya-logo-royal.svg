<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="royalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#royalGradient)" />
  
  <!-- Medical cross with shadow -->
  <g filter="url(#shadow)">
    <rect x="200" y="120" width="112" height="272" rx="16" fill="white" />
    <rect x="120" y="200" width="272" height="112" rx="16" fill="white" />
  </g>
  
  <!-- Heart in center -->
  <path d="M256,220 C240,200 200,200 200,240 C200,260 256,320 256,320 C256,320 312,260 312,240 C312,200 272,200 256,220 Z" fill="#ef4444" />
  
  <!-- Text INUA -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="white">INUA</text>
  
  <!-- Text AFYA -->
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="white">AFYA</text>
</svg>
