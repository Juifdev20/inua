<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="medicalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#medicalGradient)" />
  
  <!-- Medical cross symbol -->
  <rect x="200" y="120" width="112" height="272" rx="16" fill="white" />
  <rect x="120" y="200" width="272" height="112" rx="16" fill="white" />
  
  <!-- Heart in center -->
  <path d="M256,220 C240,200 200,200 200,240 C200,260 256,320 256,320 C256,320 312,260 312,240 C312,200 272,200 256,220 Z" fill="#ef4444" />
  
  <!-- Text INUA -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="white">INUA</text>
  
  <!-- Text AFIA -->
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="white">AFIA</text>
</svg>
