<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="greenBgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#6ee7b7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#064e3b" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background circle with shadow -->
  <circle cx="256" cy="256" r="240" fill="url(#greenBgGradient)" filter="url(#shadow)" />
  
  <!-- Medical cross white -->
  <rect x="200" y="120" width="112" height="272" rx="16" fill="white" />
  <rect x="120" y="200" width="272" height="112" rx="16" fill="white" />
  
  <!-- Heart in center -->
  <path d="M256,220 C240,200 200,200 200,240 C200,260 256,320 256,320 C256,320 312,260 312,240 C312,200 272,200 256,220 Z" fill="#f43f5e" />
  
  <!-- Text INUA AFYA -->
  <text x="256" y="440" font-family="Arial, sans-serif" font-size="44" font-weight="bold" text-anchor="middle" fill="white">INUA AFYA</text>
</svg>
